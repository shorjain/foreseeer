<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/x-icon" href="Images/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="Images/favicon-32x32.png">
    <link rel="apple-touch-icon" href="Images/apple-touch-icon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foreseeer - Smart Demand Forecasting</title>

    <!-- UPDATED FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">

<style>
:root {
    --ink: #2d3748;
    --paper: #f8f9fa;
    --accent: #667eea;
    --accent2: #764ba2;
    --gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    --muted: #718096;
    --card-bg: #ffffff;
}

body {
    font-family: 'Inter', sans-serif;
    background: var(--paper);
    color: var(--ink);
    margin: 0;
}

/* ===== HERO ===== */
.hero {
    background: var(--gradient);
    color: white;
    padding: 80px 20px;
    text-align: center;
}

.hero h1 {
    font-family: 'Syne', sans-serif;
    font-size: 48px;
}

/* ===== CONTROLS ===== */
.controls {
    padding: 20px;
    max-width: 800px;
    margin: auto;
}

/* ===== METHOD EXPLAINER ===== */
#method-explainer {
    margin-top: 10px;
    font-size: 14px;
    opacity: 0.85;
}

/* ===== STATS ===== */
.analytics-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
    padding: 20px;
}

.stat-card {
    background: rgba(0,0,0,0.03);
    padding: 18px;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.2s;
}

.stat-card:hover {
    transform: translateY(-3px);
    background: rgba(0,0,0,0.06);
}

.stat-label {
    font-size: 12px;
    opacity: 0.6;
}

.stat-value {
    font-size: 24px;
    font-weight: 600;
}

.stat-explain {
    display: none;
    margin-top: 8px;
    font-size: 13px;
    opacity: 0.8;
}
</style>
</head>

<body>

<div class="hero">
    <h1>Foreseeer</h1>
    <p>Predict your demand using real data</p>
</div>

<div class="controls">

    <label>Forecast Method</label>
    <select id="method">
        <option value="holt">Holt</option>
        <option value="ets">Exponential</option>
        <option value="ma">Moving Average</option>
    </select>

    <div id="method-explainer"></div>

    <button onclick="runForecast()">Run Forecast</button>
</div>

<div class="analytics-grid" id="analytics-grid"></div>

<script>

/* ===== METHOD EXPLANATIONS ===== */
const methodDescriptions = {
    holt: "Best for growing or declining businesses. Captures trends.",
    ets: "Best for stable demand. Smooths past data.",
    ma: "Simple average. Good baseline but ignores trends."
};

function updateMethodExplanation() {
    var method = document.getElementById('method').value;
    document.getElementById('method-explainer').innerText = methodDescriptions[method];
}

document.getElementById('method').addEventListener('change', updateMethodExplanation);
updateMethodExplanation();

/* ===== CLICKABLE STATS ===== */
function toggleExplain(card) {
    var e = card.querySelector('.stat-explain');
    e.style.display = e.style.display === 'block' ? 'none' : 'block';
}

/* ===== FAKE DATA FOR DEMO ===== */
function runForecast() {

    const analytics = {
        avg: 52,
        stddev: 12,
        max: 80,
        maxDay: "Sat",
        wowGrowth: 8
    };

    const wowClass = "trend-up";
    const wowStr = "+8%";

    document.getElementById('analytics-grid').innerHTML = `

    <div class="stat-card" onclick="toggleExplain(this)">
        <div class="stat-label">Avg Daily Sales</div>
        <div class="stat-value">${analytics.avg}</div>
        <div class="stat-explain">Baseline daily demand.</div>
    </div>

    <div class="stat-card" onclick="toggleExplain(this)">
        <div class="stat-label">Volatility</div>
        <div class="stat-value">${analytics.stddev}</div>
        <div class="stat-explain">Higher = less predictable.</div>
    </div>

    <div class="stat-card" onclick="toggleExplain(this)">
        <div class="stat-label">Growth</div>
        <div class="stat-value">${wowStr}</div>
        <div class="stat-explain">Demand trend direction.</div>
    </div>

    <div class="stat-card" onclick="toggleExplain(this)">
        <div class="stat-label">Best Day</div>
        <div class="stat-value">${analytics.max}</div>
        <div class="stat-explain">Peak demand day.</div>
    </div>

    `;
}
</script>

</body>
</html>
